name: E2E (Vercel preview)

on:
  deployment_status:

jobs:
  playwright:
    # Vercel fires deployment_status when a preview finishes. Only run on success
    # and skip production so this doesn't re-run against prod on every promote.
    if: >-
      github.event.deployment_status.state == 'success' &&
      github.event.deployment_status.environment != 'production' &&
      github.event.deployment_status.environment != 'Production'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium webkit

      - name: Run Playwright against Vercel preview
        run: pnpm exec playwright test
        env:
          CI: "true"
          E2E_BASE_URL: ${{ github.event.deployment_status.target_url }}
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}

      - name: Upload Playwright traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: |
            test-results/
            playwright-report/
          retention-days: 7
          if-no-files-found: ignore
